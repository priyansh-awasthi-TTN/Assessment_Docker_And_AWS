email.activation.body=ई-कॉमर्स प्लेटफॉर्म में आपका स्वागत है!\n\nकृपया नीचे दिए गए लिंक का उपयोग करके अपना खाता सक्रिय करें:\n\n{0}\n\nयह लिंक 3 घंटे में समाप्त हो जाएगा।\n\nयदि आपने पंजीकरण नहीं किया है, तो इस ईमेल को अनदेखा करें।
email.seller_registration.body=प्रिय विक्रेता,\n\nआपका विक्रेता खाता सफलतापूर्वक बनाया गया है।\n\nहमारी टीम आपके विवरणों की समीक्षा करेगी और जल्द ही आपके खाते को अनुमोदित करेगी।\n\nअनुमोदन प्रक्रिया पूर्ण होने पर आपको सूचित किया जाएगा।\n\nसादर,\nई-कॉमर्स टीम
email.account_locked.body=कई असफल लॉगिन प्रयासों के कारण आपका खाता लॉक हो गया है।\n\nकृपया अपना खाता अनलॉक करने के लिए सहायता से संपर्क करें।\n\nसादर,\nई-कॉमर्स टीम
email.password_reset.body=हमें आपका पासवर्ड रीसेट करने का अनुरोध मिला है।\n\nइसे रीसेट करने के लिए नीचे दिए गए लिंक का उपयोग करें:\n\n{0}\n\nयह लिंक जल्द ही समाप्त हो जाएगा। यदि आपने यह अनुरोध नहीं किया है, तो आप इस ईमेल को अनदेखा कर सकते हैं।
email.password_changed.body=आपका पासवर्ड हाल ही में बदला गया था।\n\nयदि आपने यह कार्य नहीं किया है, तो कृपया तुरंत सहायता से संपर्क करें।\n\nसादर,\nई-कॉमर्स टीम
email.account_activated.body=अच्छी खबर! आपका खाता एक व्यवस्थापक द्वारा सफलतापूर्वक सक्रिय कर दिया गया है।\n\nअब आप लॉग इन कर सकते हैं और प्लेटफॉर्म की सभी सुविधाओं का उपयोग कर सकते हैं।\n\nसादर,\nई-कॉमर्स टीम
email.account_deactivated.body=यह सूचना है कि आपका खाता एक व्यवस्थापक द्वारा निष्क्रिय कर दिया गया है।\n\nयदि आपको लगता है कि यह एक त्रुटि है, तो कृपया सहायता से संपर्क करें।\n\nसादर,\nई-कॉमर्स टीम
email.product_activated.body=प्रिय विक्रेता,\n\nअच्छी खबर! आपका उत्पाद '{0}' की समीक्षा की गई है और अब हमारे प्लेटफॉर्म पर सक्रिय है।\n\nग्राहक अब आपका उत्पाद देख और खरीद सकते हैं।\n\nसादर,\nव्यवस्थापक टीम
email.product_deactivated.body=प्रिय विक्रेता,\n\nयह सूचित करना है कि आपका उत्पाद '{0}' व्यवस्थापक द्वारा निष्क्रिय कर दिया गया है।\n\nउत्पाद अब ग्राहकों को दिखाई नहीं दे रहा। यदि आपके कोई प्रश्न हैं तो कृपया सहायता से संपर्क करें।\n\nसादर,\nव्यवस्थापक टीम
email.product_created.body=प्रिय व्यवस्थापक,\n\nएक नया उत्पाद बनाया गया है और आपकी समीक्षा की आवश्यकता है:\n\nउत्पाद विवरण:\n- उत्पाद का नाम: {2}\n- श्रेणी: {3}\n- ब्रांड: {4}\n- विक्रेता: {0} ({1})\n\nकृपया समीक्षा करें और यदि यह प्लेटफॉर्म दिशानिर्देशों को पूरा करता है तो उत्पाद को सक्रिय करें।\n\nसादर,\nई-कॉमर्स सिस्टम

