email.activation.body=Willkommen bei der E-Commerce-Plattform!\n\nBitte aktivieren Sie Ihr Konto mit dem unten stehenden Link:\n\n{0}\n\nDieser Link läuft in 3 Stunden ab.\n\nWenn Sie sich nicht registriert haben, ignorieren Sie diese E-Mail.
email.seller_registration.body=Lieber Verkäufer,\n\nIhr Verkäuferkonto wurde erfolgreich erstellt.\n\nUnser Team wird Ihre Details überprüfen und Ihr Konto in Kürze genehmigen.\n\nSie werden benachrichtigt, sobald der Genehmigungsprozess abgeschlossen ist.\n\nMit freundlichen Grüßen,\nE-Commerce-Team
email.account_locked.body=Ihr Konto wurde aufgrund mehrerer fehlgeschlagener Anmeldeversuche gesperrt.\n\nBitte kontaktieren Sie den Support, um Ihr Konto zu entsperren.\n\nMit freundlichen Grüßen,\nE-Commerce-Team
email.password_reset.body=Wir haben eine Anfrage zum Zurücksetzen Ihres Passworts erhalten.\n\nVerwenden Sie den unten stehenden Link, um es zurückzusetzen:\n\n{0}\n\nDieser Link läuft bald ab. Wenn Sie diese Anfrage nicht gestellt haben, können Sie diese E-Mail ignorieren.
email.password_changed.body=Ihr Passwort wurde kürzlich geändert.\n\nWenn Sie diese Aktion nicht durchgeführt haben, kontaktieren Sie bitte sofort den Support.\n\nMit freundlichen Grüßen,\nE-Commerce-Team
email.account_activated.body=Gute Nachrichten! Ihr Konto wurde von einem Administrator erfolgreich aktiviert.\n\nSie können sich jetzt anmelden und auf alle Funktionen der Plattform zugreifen.\n\nMit freundlichen Grüßen,\nDas E-Commerce-Team
email.account_deactivated.body=Dies ist eine Benachrichtigung, dass Ihr Konto von einem Administrator deaktiviert wurde.\n\nWenn Sie glauben, dass dies ein Fehler ist, kontaktieren Sie bitte den Support.\n\nMit freundlichen Grüßen,\nDas E-Commerce-Team
email.product_activated.body=Lieber Verkäufer,\n\nGute Nachrichten! Ihr Produkt '{0}' wurde überprüft und ist jetzt auf unserer Plattform AKTIVIERT.\n\nKunden können Ihr Produkt jetzt sehen und kaufen.\n\nMit freundlichen Grüßen,\nAdmin-Team
email.product_deactivated.body=Lieber Verkäufer,\n\nHiermit informieren wir Sie, dass Ihr Produkt '{0}' vom Administrator DEAKTIVIERT wurde.\n\nDas Produkt ist für Kunden nicht mehr sichtbar. Bitte kontaktieren Sie den Support, wenn Sie Fragen haben.\n\nMit freundlichen Grüßen,\nAdmin-Team
email.product_created.body=Lieber Admin,\n\nEin neues Produkt wurde erstellt und benötigt Ihre Überprüfung:\n\nProduktdetails:\n- Produktname: {2}\n- Kategorie: {3}\n- Marke: {4}\n- Verkäufer: {0} ({1})\n\nBitte überprüfen und aktivieren Sie das Produkt, wenn es den Plattform-Richtlinien entspricht.\n\nMit freundlichen Grüßen,\nE-Commerce-System

