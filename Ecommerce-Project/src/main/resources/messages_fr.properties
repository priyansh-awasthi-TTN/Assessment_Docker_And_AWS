email.activation.body=Bienvenue sur la plateforme E-commerce!\n\nVeuillez activer votre compte en utilisant le lien ci-dessous:\n\n{0}\n\nCe lien expirera dans 3 heures.\n\nSi vous ne vous êtes pas inscrit, ignorez cet email.
email.seller_registration.body=Cher vendeur,\n\nVotre compte vendeur a été créé avec succès.\n\nNotre équipe examinera vos détails et approuvera votre compte sous peu.\n\nVous serez notifié une fois le processus d'approbation terminé.\n\nCordialement,\nÉquipe E-commerce
email.account_locked.body=Votre compte a été verrouillé en raison de plusieurs tentatives de connexion échouées.\n\nVeuillez contacter le support pour déverrouiller votre compte.\n\nCordialement,\nÉquipe E-commerce
email.password_reset.body=Nous avons reçu une demande de réinitialisation de votre mot de passe.\n\nUtilisez le lien ci-dessous pour le réinitialiser:\n\n{0}\n\nCe lien expirera bientôt. Si vous n'avez pas fait cette demande, vous pouvez ignorer cet email.
email.password_changed.body=Votre mot de passe a été récemment modifié.\n\nSi vous n'avez pas effectué cette action, veuillez contacter le support immédiatement.\n\nCordialement,\nÉquipe E-commerce
email.account_activated.body=Bonne nouvelle! Votre compte a été activé avec succès par un administrateur.\n\nVous pouvez maintenant vous connecter et accéder à toutes les fonctionnalités de la plateforme.\n\nCordialement,\nL'équipe E-Commerce
email.account_deactivated.body=Ceci est une notification que votre compte a été désactivé par un administrateur.\n\nSi vous pensez que c'est une erreur, veuillez contacter le support.\n\nCordialement,\nL'équipe E-Commerce
email.product_activated.body=Cher vendeur,\n\nBonne nouvelle! Votre produit '{0}' a été examiné et est maintenant ACTIVÉ sur notre plateforme.\n\nLes clients peuvent maintenant voir et acheter votre produit.\n\nCordialement,\nÉquipe Admin
email.product_deactivated.body=Cher vendeur,\n\nCeci est pour vous informer que votre produit '{0}' a été DÉSACTIVÉ par l'administrateur.\n\nLe produit n'est plus visible pour les clients. Veuillez contacter le support si vous avez des questions.\n\nCordialement,\nÉquipe Admin
email.product_created.body=Cher Admin,\n\nUn nouveau produit a été créé et nécessite votre révision:\n\nDétails du produit:\n- Nom du produit: {2}\n- Catégorie: {3}\n- Marque: {4}\n- Vendeur: {0} ({1})\n\nVeuillez réviser et activer le produit s'il respecte les directives de la plateforme.\n\nCordialement,\nSystème E-commerce

