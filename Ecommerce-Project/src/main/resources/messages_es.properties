email.activation.body=¡Bienvenido a la Plataforma E-commerce!\n\nPor favor activa tu cuenta usando el enlace de abajo:\n\n{0}\n\nEste enlace expirará en 3 horas.\n\nSi no te registraste, ignora este email.
email.seller_registration.body=Estimado vendedor,\n\nTu cuenta de vendedor ha sido creada exitosamente.\n\nNuestro equipo revisará tus detalles y aprobará tu cuenta en breve.\n\nSerás notificado una vez que el proceso de aprobación esté completo.\n\nSaludos,\nEquipo E-commerce
email.account_locked.body=Tu cuenta ha sido bloqueada debido a múltiples intentos de inicio de sesión fallidos.\n\nPor favor contacta soporte para desbloquear tu cuenta.\n\nSaludos,\nEquipo E-commerce
email.password_reset.body=Recibimos una solicitud para restablecer tu contraseña.\n\nUsa el enlace de abajo para restablecerla:\n\n{0}\n\nEste enlace expirará pronto. Si no hiciste esta solicitud, puedes ignorar este email.
email.password_changed.body=Tu contraseña fue cambiada recientemente.\n\nSi no realizaste esta acción, por favor contacta soporte inmediatamente.\n\nSaludos,\nEquipo E-commerce
email.account_activated.body=¡Buenas noticias! Tu cuenta ha sido activada exitosamente por un administrador.\n\nAhora puedes iniciar sesión y acceder a todas las características de la plataforma.\n\nSaludos,\nEl Equipo E-Commerce
email.account_deactivated.body=Esta es una notificación de que tu cuenta ha sido desactivada por un administrador.\n\nSi crees que esto es un error, por favor contacta soporte.\n\nSaludos,\nEl Equipo E-Commerce
email.product_activated.body=Estimado vendedor,\n\n¡Buenas noticias! Tu producto '{0}' ha sido revisado y ahora está ACTIVADO en nuestra plataforma.\n\nLos clientes ahora pueden ver y comprar tu producto.\n\nSaludos,\nEquipo Admin
email.product_deactivated.body=Estimado vendedor,\n\nEsto es para informarte que tu producto '{0}' ha sido DESACTIVADO por el administrador.\n\nEl producto ya no es visible para los clientes. Por favor contacta soporte si tienes preguntas.\n\nSaludos,\nEquipo Admin
email.product_created.body=Estimado Admin,\n\nUn nuevo producto ha sido creado y requiere tu revisión:\n\nDetalles del producto:\n- Nombre del producto: {2}\n- Categoría: {3}\n- Marca: {4}\n- Vendedor: {0} ({1})\n\nPor favor revisa y activa el producto si cumple con las directrices de la plataforma.\n\nSaludos,\nSistema E-commerce

